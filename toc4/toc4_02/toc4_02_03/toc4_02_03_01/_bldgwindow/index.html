TkSuQmCC"></figure><p about="urn:metanorma-xml-id:_dbe6e4b0-8c20-a7e5-c6da-b3b2163e2b24" id="urn%3Ametanorma-xml-id%3A_dbe6e4b0-8c20-a7e5-c6da-b3b2163e2b24">CityGMLでは、窓を面として表現し、一つの窓を外側と内側の二つのbldg:Windowのオブジェクトとして表現する。例えば、屋内と屋外をつなぐ窓があった場合、外側となるbldg:Windowは、建築物の外壁面（bldg:WallSurface）等の境界面に含まれる。</p><p about="urn:metanorma-xml-id:_0c00938e-5836-e4a7-6302-827bbd6264b5" id="urn%3Ametanorma-xml-id%3A_0c00938e-5836-e4a7-6302-827bbd6264b5">内側となるbldg:Windowは、部屋の内壁面（bldg:InteriorWallSurface）等の境界面に含まれる。</p><p about="urn:metanorma-xml-id:_ce253349-2150-b01b-4085-4e1fb8b7bd87" id="urn%3Ametanorma-xml-id%3A_ce253349-2150-b01b-4085-4e1fb8b7bd87">このとき、屋外の境界面（bldg:WallSurface、bldg:GroundSurface、bldg:OuterFloorSurface、bldg:OuterCeilingSurface）に設けられた開口部は、常にその法線ベクトルが建築物の外側を向く。部屋の境界面（bldg:InteriorWallSurface、bldg:FloorSurface、bldg:CeilingSurface）に設けられた開口部は、常にその法線ベクトルが部屋の内側を向く。</p></td></tr><tr><th><p>上位の型</p></th><td colspan="2"><p about="urn:metanorma-xml-id:_152bfe8a-0b27-b03a-b7b0-be6b877604cb" id="urn%3Ametanorma-xml-id%3A_152bfe8a-0b27-b03a-b7b0-be6b877604cb">bldg:_Opening</p></td></tr><tr><th><p>ステレオタイプ</p></th><td colspan="2"><p about="urn:metanorma-xml-id:_adcce9c8-8464-fedd-ae6b-f3695f45111f" id="urn%3Ametanorma-xml-id%3A_adcce9c8-8464-fedd-ae6b-f3695f45111f">&lt;&lt; FeatureType &gt;&gt;</p></td></tr><tr><th colspan="3"><p>継承する属性</p></th></tr><tr><th><p>属性名</p></th><th><p>属性の型及び多重度</p></th><th><p>定義</p></th></tr><tr><th><p>(gml:description)</p></th><td><p about="urn:metanorma-xml-id:_989bfb7e-a03e-c741-73da-3915900b2411" id="urn%3Ametanorma-xml-id%3A_989bfb7e-a03e-c741-73da-3915900b2411">gml:StringOrRefType [0..1]</p></td><td><p about="urn:metanorma-xml-id:_f13e477e-960d-89cb-d224-2fea8008815c" id="urn%3Ametanorma-xml-id%3A_f13e477e-960d-89cb-d224-2fea8008815c">開口部の概要。</p></td></tr><tr><td><p about="urn:metanorma-xml-id:_7252a56b-70df-e39e-05e0-0e0c3057ad36" id="urn%3Ametanorma-xml-id%3A_7252a56b-70df-e39e-05e0-0e0c3057ad36">gml:name</p></td><td><p about="urn:metanorma-xml-id:_0
