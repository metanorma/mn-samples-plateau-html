r><tr><td><p about="urn:metanorma-xml-id:_5313019e-eb26-9f5c-1898-a4d515a660fd" id="urn%3Ametanorma-xml-id%3A_5313019e-eb26-9f5c-1898-a4d515a660fd">LOD4.2</p></td><td><p about="urn:metanorma-xml-id:_f8df4326-a374-8c7a-b3ea-0e6992d0a318" id="urn%3Ametanorma-xml-id%3A_f8df4326-a374-8c7a-b3ea-0e6992d0a318">●</p></td><td><p about="urn:metanorma-xml-id:_7eecd9c8-6e68-0d38-cda5-833e6b7cbfdc" id="urn%3Ametanorma-xml-id%3A_7eecd9c8-6e68-0d38-cda5-833e6b7cbfdc">UndergroundBuilding</p></td><td><p about="urn:metanorma-xml-id:_76b06616-2c7c-b5fe-7c91-4af3929b1ad0" id="urn%3Ametanorma-xml-id%3A_76b06616-2c7c-b5fe-7c91-4af3929b1ad0">Solid又はMultiSurface</p></td><td><p about="urn:metanorma-xml-id:_a5624e35-bc66-4334-b01a-f32f1fc2bfba" id="urn%3Ametanorma-xml-id%3A_a5624e35-bc66-4334-b01a-f32f1fc2bfba">全てを対象とする。</p></td><td><ul><li><p about="urn:metanorma-xml-id:_32bdb8df-adda-8d6d-8eff-6826a5150a62" id="urn%3Ametanorma-xml-id%3A_32bdb8df-adda-8d6d-8eff-6826a5150a62">屋根面（RoofSurface）、外壁面（WallSurface）及び底面（GroundSurface）を境界面とする立体又は面の集まりを作成する。</p></li></ul></td><td><p about="urn:metanorma-xml-id:_010d8c04-7587-8e7a-4a89-b39a66170d57" id="urn%3Ametanorma-xml-id%3A_010d8c04-7587-8e7a-4a89-b39a66170d57">測量により取得する場合は、Solidとする。BIMモデルからの変換により取得する場合はMultiSurfaceとする。</p></td></tr><tr><td><p about="urn:metanorma-xml-id:_60694910-51fc-a08f-2f97-6378d061da11" id="urn%3Ametanorma-xml-id%3A_60694910-51fc-a08f-2f97-6378d061da11">LOD4.2</p></td><td><p about="urn:metanorma-xml-id:_b2a158e9-87b6-570b-7f77-7b09c446dabe" id="urn%3Ametanorma-xml-id%3A_b2a158e9-87b6-570b-7f77-7b09c446dabe">●</p></td><td><p about="urn:metanorma-xml-id:_1534223b-11fb-a3c2-b017-9abbfdcfed19" id="urn%3Ametanorma-xml-id%3A_1534223b-11fb-a3c2-b017-9abbfdcfed19">RoofSurface</p></td><td><p about="urn:metanorma-xml-id:_95df1858-7390-c51b-4031-6e743c4785d8" id="urn%3Ametanorma-xml-id%3A_95df1858-7390-c51b-4031-6e743c4785d8">MultiSurface</p></td><td><p about="urn:metanorma-xml-id:_6f266bd5-499b-5940-be9a-34cbc02e30b2" id="urn%3Ametanorma-xml-id%3A_6f266bd5-499b-5940-be9a-34cbc02e30b2">全てを対象とする。</p></td><td><ul><li><p about="urn:metanorma-xml-id:_783a9c4e-7732-ee89-b8d9-e9922c7a3b92" id="urn%3Ametanorma-xml-id%3A_783a9c4e-7732-ee89-b8d9-e9922c7a3b92">地下街の外形を取得し、上向き面を屋根面（RoofSurface）とする。</p></li><li><p about="urn:metanorma-xml-id:_5f96047f-0161-7fe1-329c-868eec9518b5" id="urn%3Ametanorma-xml-id%3A_5f96047f-0161-7fe1-329c-868eec9518b5">面を構成する各頂点にそれぞれの高さを与える。</p></li></ul></td><td><p about="urn:metanorma-xml-id:_92bec2cc-6474-8570-2aeb-58df25e49d1f" id="urn%3Ametanorma-xml-id%3A_92bec2cc-6474-8570-2aeb-58df25e49d1f">曲面の場合は、データセットが採用する地図情報レベルの水平及び高さの誤差の標準偏差に収まるよう平面に分割する。</p></td></tr><tr><td><p about="urn:metanorma-xml-id:_ae17e8bb-c7ec-12eb-fcbc-d2947c80f321" id="urn%3Ametanorma-xml-id%3A_ae17e8bb-c7ec-12eb-fcbc-d2947c80f321">LOD4.2</p></td><td><p about="urn:metanorma-xml-id:_e685b47e-ff97-2963-ac05-ba093854f179" id="urn%3Ametanorma-xml-id%3A_e685b47e-ff97-2963-ac05-ba093854f179">●</p></td><td><p about="urn:metanorma-xml-id:_425d41db-019b-5a11-c24f-34b158a288e3" id="urn%3Ametanorma-xml-id%3A_425d41db-019b-5a11-c24f-34b158a288e3">GroundSurface</p></td><td><p about="urn:metanorma-xml-id:_528a4d4e-bf7c-5e9d-d347-1097844a2913" id="urn%3Ametanorma-xml-id%3A_528a4d4e-bf7c-5e9d-d347-1097844a2913">MultiSurface</p></td><td><p about="urn:metanorma-xml-id:_e491f26a-6c99-3f7a-f76b-05af90ac9e27" id="urn%3Ametanorma-xml-id%3A_e491f26a-6c99-3f7a-f76b-05af90ac9e27">全てを対象とする。</p></td><td><ul><li><p about="urn:metanorma-xml-id:_ff0f10db-45d3-8dd0-7263-289b44f4fe80" id="urn%3Ametanorma-xml-id%3A_ff0f10db-45d3-8dd0-7263-289b44f4fe80">地下街の外形を取得し、下向き面を底面（GroundSurface）とする。</p></li><li><p about="urn:metanorma-xml-id:_efc3fae6-c118-4948-5d3e-8fa26bc648c7" id="urn%3Ametanorma-xml-id%3A_efc3fae6-c118-4948-5d3e-8fa26bc648c7">面を構成する各頂点にそれぞれの高さを与える。</p></li></ul></td><td></td></tr><tr><td><p about="urn:metanorma-xml-id:_89426601-afd6-7e6e-c4b2-cf485e9e9ab8" id="urn%3Ametanorma-xml-id%3A_89426601-afd6-7e6e-c4b2-cf485e9e9ab8">LOD4.2</p></td><td><p about="urn:metanorma-xml-id:_d5dc1b6f-375a-4e88-4c73-ece26c197fa2" id="urn%3Ametanorma-xml-id%3A_d5dc1b6f-375a-4e88-4c73-ece26c197fa2">●</p></td><td><p about="urn:metanorma-xml-id:_cbc9c669-a1a1-03b1-1d8a-c8e774b2c614" id="urn%3Ametanorma-xml-id%3A_cbc9c669-a1a1-03b1-1d8a-c8e774b2c614">WallSurface</p></td><td><p about="urn:metanorma-xml-id:_98b47cdb-2cb2-e9a2-d08b-08a7c9ce464f" id="urn%3Ametanorma-xml-id%3A_98b47cdb-2cb2-e9a2-d08b-08a7c9ce464f">MultiSurface</p></td><td><p about="urn:metanorma-xml-id:_2941b3f3-4cff-dcd1-6eba-821261a9038e" id="urn%3Ametanorma-xml-id%3A_2941b3f3-4cff-dcd1-6eba-821261a9038e">全てを対象とする。</p></td><td><ul><li><p about="urn:metanorma-xml-id:_8587f273-de18-51f9-445f-ae66afc9e06b" id="urn%3Ametanorma-xml-id%3A_8587f273-de18-51f9-445f-ae66afc9e06b">地下街の外形を取得し、屋根面（RoofSuface）及び底面（GroundSurface）以外の面を外壁面（WallSurface）とする。</p></li><li><p about="urn:metanorma-xml-id:_614682f6-95f1-a234-89fe-939f86c57a2e" id="urn%3Ametanorma-xml-id%3A_614682f6-95f1-a234-89fe-939f86c57a2e">面を構成する各頂点にそれぞれの高さを与える。</p></li></ul></td><td><p about="urn:metanorma-xml-id:_82e27ece-a4ac-78a5-ca94-21b19eb67598" id="urn%3Ametanorma-xml-id%3A_82e27ece-a4ac-78a5-ca94-21b19eb67598">曲面の場合は、データセットが採用する地図情報レベルの水平及び高さの誤差の標準偏差に収まるよう平面に分割する。</p></td></tr><tr><td><p about="urn:metanorma-xml-id:_4280a24b-dc38-ea7c-e41d-383dac455069" id="urn%3Ametanorma-xml-id%3A_4280a24b-dc38-ea7c-e41d-383dac455069">LOD4.2</p></td><td><p about="urn:metanorma-xml-id:_32c80e6f-58a8-cecd-e4bd-073a50051af8" id="urn%3Ametanorma-xml-id%3A_32c80e6f-58a8-cecd-e4bd-073a50051af8">■</p></td><td><p about="urn:metanorma-xml-id:_8ae9f580-c716-f615-7776-b586af7c2a37" id="urn%3Ametanorma-xml-id%3A_8ae9f580-c716-f615-7776-b586af7c2a37">BuildingPart</p></td><td><p about="urn:metanorma-xml-id:_4db947a7-981b-7694-2de6-4a4eb45e3cc0" id="urn%3Ametanorma-xml-id%3A_4db947a7-981b-7694-2de6-4a4eb45e3cc0">Solid</p></td><td><p about="urn:metanorma-xml-id:_aac41c8a-939b-9ea0-6bde-ef2c42a82f28" id="urn%3Ametanorma-xml-id%3A_aac41c8a-939b-9ea0-6bde-ef2c42a82f28">1棟の地下街を、主題属性の異なる複数の部分に分けたい場合</p></td><td><ul><li><p about="urn:metanorma-xml-id:_649b9322-0f98-7132-6914-cfc3a2adea07" id="urn%3Ametanorma-xml-id%3A_649b9322-0f98-7132-6914-cfc3a2adea07">屋根面（RoofSurface）、外壁面（WallSurface）、底面（GroundSurface）及び閉鎖面（ClosureSurface）を境界面とする立体を作成する。</p></li></ul></td><td><ul><li><p about="urn:metanorma-xml-id:_e507b92b-a6f8-82cf-cb14-89e22d87f7af" id="urn%3Ametanorma-xml-id%3A_e507b92b-a6f8-82cf-cb14-89e22d87f7af">BuildingPartを使用する場合、1棟のBuildingには必ず2つ以上のBuildingPartが含まれていなければならず、それらは互いに接していなければならない。</p></li><li><p about="urn:metanorma-xml-id:_187afbad-46c4-1238-1461-22d62c894d3f" id="urn%3Ametanorma-xml-id%3A_187afbad-46c4-1238-1461-22d62c894d3f">BuildingPartを使用する場合、Buildingの空間属性は空となる。</p></li></ul></td></tr><tr><td rowspan="2"><p about="urn:metanorma-xml-id:_4dfa76ad-e804-b86d-1cd7-aa9f78c38bfb" id="urn%3Ametanorma-xml-id%3A_4dfa76ad-e804-b86d-1cd7-aa9f78c38bfb">LOD4.2</p></td><td><p about="urn:metanorma-xml-id:_fc3b1c5a-fb19-5409-2909-f521eeeaa17d" id="urn%3Ametanorma-xml-id%3A_fc3b1c5a-fb19-5409-2909-f521eeeaa17d">●</p></td><td><p about="urn:metanorma-xml-id:_742ca297-2e2f-ea01-5e78-af25dca4c9a6" id="urn%3Ametanorma-xml-id%3A_742ca297-2e2f-ea01-5e78-af25dca4c9a6">ClosureSurface</p></td><td><p about="urn:metanorma-xml-id:_ab14772b-54c4-fbc6-bb83-0004cbcd5709" id="urn%3Ametanorma-xml-id%3A_ab14772b-54c4-fbc6-bb83-0004cbcd5709">MultiSurface</p></td><td><ul><li><p about="urn:metanorma-xml-id:_7a0f1a77-67f7-3c8a-3b6c-b736c4318931" id="urn%3Ametanorma-xml-id%3A_7a0f1a77-67f7-3c8a-3b6c-b736c4318931">地下街への出入り口となる開口部</p></li></ul></td><td><ul><li><p about="urn:metanorma-xml-id:_d16d0657-81b9-3eef-4a4f-c1e1fb2881f3" id="urn%3Ametanorma-xml-id%3A_d16d0657-81b9-3eef-4a4f-c1e1fb2881f3">地下街の外壁面と地表面との交線により囲まれた面を取得する。</p></li></ul></td><td><ul><li><p about="urn:metanorma-xml-id:_f2a3b22a-e539-0996-30d6-2600ceed70da" id="urn%3Ametanorma-xml-id%3A_f2a3b22a-e539-0996-30d6-2600ceed70da">地上に設置された地下街出入口の建屋は都市設備（CityFurniture）として取得する。</p></li></ul></td></tr><tr><td><p about="urn:metanorma-xml-id:_2d5b2fe4-f21f-be3e-fcbf-e2f759e3a8e4" id="urn%3Ametanorma-xml-id%3A_2d5b2fe4-f21f-be3e-fcbf-e2f759e3a8e4">■</p></td><td><p about="urn:metanorma-xml-id:_792eba1b-f533-0919-5b2d-6ce5afccb702" id="urn%3Ametanorma-xml-id%3A_792eba1b-f533-0919-5b2d-6ce5afccb702">ClosureSurface</p></td><td><p about="urn:metanorma-xml-id:_8d9fa7f2-5189-1731-3c76-310fd96b9b79" id="urn%3Ametanorma-xml-id%3A_8d9fa7f2-5189-1731-3c76-310fd96b9b79">MultiSurface</p></td><td><ul><li><p about="urn:metanorma-xml-id:_35d68ab6-ec3d-d2af-f2a7-83f0fe012cc1" id="urn%3Ametanorma-xml-id%3A_35d68ab6-ec3d-d2af-f2a7-83f0fe012cc1">BuildingPartを作成する場合</p></li></ul></td><td><ul><li><p about="urn:metanorma-xml-id:_32b940eb-6ae9-63c3-4cd2-0641db8ce545" id="urn%3Ametanorma-xml-id%3A_32b940eb-6ae9-63c3-4cd2-0641db8ce545">BuildingPartと連続する他のBuildingPartとの境界線により囲まれた面を取得する。</p></li></ul></td><td><ul><li><p about="urn:metanorma-xml-id:_2d868c46-e588-fd5c-60f9-da5922578436" id="urn%3Ametanorma-xml-id%3A_2d868c46-e588-fd5c-60f9-da5922578436">ClosureSurfaceの境界線は、屋根面（RoofSurface）、外壁面（WallSurface）又は底面（GroundSurface）を区切る線分となる。</p></li></ul></td></tr><tr><td><p about="urn:metanorma-xml-id:_dde30b40-1d1d-bc12-6ad6-ff13714693e9" id="urn%3Ametanorma-xml-id%3A_dde30b40-1d1d-bc12-6ad6-ff13714693e9">LOD4.2</p></td><td></td><td><p about="urn:metanorma-xml-id:_aa103a4b-b349-f4c0-b484-4b7f75b0c479" id="urn%3Ametanorma-xml-id%3A_aa103a4b-b349-f4c0-b484-4b7f75b0c479">OuterFloorSurface</p></td><td></td><td></td><td></td><td><p about="urn:metanorma-xml-id:_409fc29e-f6d3-84c2-b454-c8461ff7a559" id="urn%3Ametanorma-xml-id%3A_409fc29e-f6d3-84c2-b454-c8461ff7a559">対象外</p></td></tr><tr><td><p about="urn:metanorma-xml-id:_80d1dd0d-abe1-130b-51cc-f4acb9fd5480" id="urn%3Ametanorma-xml-id%3A_80d1dd0d-abe1-130b-51cc-f4acb9fd5480">LOD4.2</p></td><td></td><td><p about="urn:metanorma-xml-id:_df37507d-02d8-d4ed-b459-b1db57c0f06b" id="urn%3Ametanorma-xml-id%3A_df37507d-02d
